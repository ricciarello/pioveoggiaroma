<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piove Oggi a Roma? ☔</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body class="loading">
    <!-- Sfondo animato -->
    <div id="weather-background"></div>

    <div class="container">
        <header>
            <h1>PIOVE OGGI A ROMA?</h1>
        </header>

        <main>
            <!-- Risposta oggi (GIGANTE) -->
            <div id="answer-box">
                <span id="answer">...</span>
            </div>

            <!-- Commento romanesco -->
            <div class="comment-container">
                <p id="comment">Sto a controllà er cielo, 'n attimo...</p>
            </div>

            <!-- Stato del Traffico -->
            <div id="traffic-box" class="info-card">
                <span class="info-label">🚦 STATO DER TRAFFICO:</span>
                <p id="traffic-text">Sto a vede' se er Raccordo è bloccato...</p>
            </div>

            <!-- Pulsanti d'azione -->
            <div class="actions">
                <button id="btn-romano" class="btn">Chiedi a un romano vero 🗣️</button>
                <button id="btn-domani" class="btn btn-tertiary">E domani? 🤔</button>
                <button id="btn-share" class="btn btn-secondary">Condividi su WhatsApp 💬</button>
            </div>
        </main>

        <footer>
            <p>Fatto co' er core da Roma ❤️ | 
                <a href="https://github.com/ricciarello" target="_blank" rel="noopener" class="github-link">
                    <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                    </svg>
                    <span>ricciarello</span>
                </a>
            </p>
        </footer>
    </div>

    <!-- Modal per la risposta di domani -->
    <div id="tomorrow-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <span class="modal-title">E DOMANI?</span>
            <div id="tomorrow-answer-box">
                <span id="tomorrow-answer">...</span>
            </div>
            <p id="tomorrow-comment">Sto a legge le carte dei tarocchi...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
