<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piove Oggi a Roma? ☔</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font per una tipografia moderna e d'impatto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body class="loading">
    <!-- Contenitore degli effetti atmosferici (pioggia o sole) -->
    <div id="weather-background"></div>

    <div class="container">
        <header>
            <h1>PIOVE OGGI A ROMA?</h1>
        </header>

        <main>
            <!-- Grande responso: SÌ / NO / CARICAMENTO -->
            <div id="answer-box">
                <span id="answer">...</span>
            </div>

            <!-- Il commento divertente in romanesco -->
            <div class="comment-container">
                <p id="comment">Sto a controllà er cielo, 'n attimo...</p>
            </div>

            <!-- Il pulsante interattivo -->
            <button id="btn-romano" class="btn">Chiedi a un romano vero 🗣️</button>
        </main>

        <footer>
            <p>Fatto co' er core da Roma ❤️ | <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
